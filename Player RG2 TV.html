<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RG2 TV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{
background:#0b0b0b;
color:white;
font-family:Arial;
margin:0;
display:flex;
height:100vh;
overflow:hidden;
}

/* LISTA */
#canais{
width:320px;
overflow:auto;
background:#111;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

/* CARD */
.canal{
background:#1a1a1a;
border-radius:8px;
padding:10px;
cursor:pointer;
text-align:center;
transition:0.2s;
}

.canal:hover{
background:#2a2a2a;
transform:scale(1.05);
}

.canal.ativo{
outline:2px solid #00aaff;
}

/* LOGO */
.canal img{
width:100%;
height:80px;
object-fit:contain;
margin-bottom:8px;
}

/* NOME */
.canal span{
font-size:14px;
display:block;
}

/* PLAYER */
#player{
flex:1;
display:flex;
justify-content:center;
align-items:center;
background:black;
}

video{
width:100%;
height:100%;
background:black;
}
</style>
</head>

<body>

<div id="canais"></div>

<div id="player">
<video id="video" controls playsinline></video>
</div>

<script>

let canais=[]
let canalAtual=0
let hls
const video=document.getElementById("video")

// =======================
// CARREGAR DADOS
// =======================

async function carregar(){

await carregarM3U("lista.m3u")
await carregarJSON("lista.json")
await carregarAPI("https://api.meusite.com/canais")

mostrar()
abrir(0)

}

async function carregarM3U(url){

try{
const res=await fetch(url)
const txt=await res.text()

const linhas=txt.split("\n")

for(let i=0;i<linhas.length;i++){

if(linhas[i].startsWith("#EXTINF")){

let nome=linhas[i].split(",")[1]
let link=linhas[i+1]

// tentativa de pegar logo (se tiver tvg-logo)
let logoMatch = linhas[i].match(/tvg-logo="(.*?)"/)
let logo = logoMatch ? logoMatch[1] : ""

canais.push({nome,url:link,logo})

}

}
}catch(e){}

}

async function carregarJSON(url){

try{
const res=await fetch(url)
const data=await res.json()

data.forEach(c=>{
canais.push({
nome:c.nome,
url:c.url,
logo:c.logo || ""
})
})

}catch(e){}

}

async function carregarAPI(url){

try{
const res=await fetch(url)
const data=await res.json()

data.canais.forEach(c=>{
canais.push({
nome:c.nome,
url:c.stream,
logo:c.logo || ""
})
})

}catch(e){}

}

// =======================
// UI (GRID COM ÍCONE)
// =======================

function mostrar(){

const div=document.getElementById("canais")
div.innerHTML=""

canais.forEach((c,i)=>{

let item=document.createElement("div")
item.className="canal"

if(i===canalAtual) item.classList.add("ativo")

item.onclick=()=>abrir(i)

item.innerHTML = `
<img src="${c.logo || 'https://via.placeholder.com/150?text=TV'}">
<span>${c.nome}</span>
`

div.appendChild(item)

})

}

// =======================
// PLAYER
// =======================

function abrir(i){

if(i < 0 || i >= canais.length) return

canalAtual=i
const url=canais[i].url

if(hls){
hls.destroy()
hls = null
}

video.pause()
video.removeAttribute("src")
video.load()

if(Hls.isSupported()){

hls = new Hls({
lowLatencyMode:true,
maxBufferLength:10,
enableWorker:true
})

hls.loadSource(url)
hls.attachMedia(video)

hls.on(Hls.Events.MANIFEST_PARSED, () => {
video.play().catch(()=>{})
})

hls.on(Hls.Events.ERROR, function(event, data) {
if (data.fatal) {
abrir(canalAtual)
}
})

}else{

video.src = url

video.onloadedmetadata = () => {
video.play().catch(()=>{})
}

}

atualizar()

}

// =======================
// CONTROLE REMOTO
// =======================

document.addEventListener("keydown", (e) => {

if(e.key === "ArrowDown") abrir(canalAtual + 2)
if(e.key === "ArrowUp") abrir(canalAtual - 2)

if(e.key === "ArrowRight") abrir(canalAtual + 1)
if(e.key === "ArrowLeft") abrir(canalAtual - 1)

if(e.key === "Enter"){
video.play().catch(()=>{})
}

})

// =======================
// ATUALIZAR UI
// =======================

function atualizar(){

document.querySelectorAll(".canal").forEach((el,i)=>{
el.classList.toggle("ativo",i===canalAtual)
})

const ativo = document.querySelector(".canal.ativo")
if(ativo){
ativo.scrollIntoView({
block: "center",
behavior: "smooth"
})
}

}

// =======================
// START
// =======================

carregar()

</script>

</body>
</html>
