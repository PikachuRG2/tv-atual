<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>RG2 TV PRO</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#0f0f0f,#050505);
color:white;
display:flex;
height:100vh;
overflow:hidden;
}

/* SIDEBAR */
#canais{
width:300px;
background:rgba(20,20,20,0.9);
backdrop-filter:blur(10px);
border-right:1px solid #222;
display:flex;
flex-direction:column;
}

/* BUSCA */
#busca{
padding:12px;
border:none;
outline:none;
background:#0d0d0d;
color:white;
font-size:15px;
border-bottom:1px solid #222;
}

/* LISTA */
#lista{
overflow-y:auto;
flex:1;
}

/* CANAL */
.canal{
padding:14px;
border-bottom:1px solid #1a1a1a;
cursor:pointer;
transition:0.2s;
}

.canal:hover{
background:#1f1f1f;
transform:translateX(4px);
}

.canal.ativo{
background:linear-gradient(90deg,#00aaff,#0066ff);
font-weight:bold;
}

/* SCROLL */
#lista::-webkit-scrollbar{
width:6px;
}
#lista::-webkit-scrollbar-thumb{
background:#333;
border-radius:10px;
}

/* PLAYER */
#player{
flex:1;
position:relative;
display:flex;
justify-content:center;
align-items:center;
background:black;
}

video{
width:100%;
height:100%;
object-fit:cover;
}

/* OVERLAY */
#overlay{
position:absolute;
top:20px;
left:20px;
background:rgba(0,0,0,0.6);
padding:10px 15px;
border-radius:10px;
font-size:18px;
}

/* RESPONSIVO */
@media(max-width:768px){
#canais{
width:200px;
}
}

</style>
</head>

<body>

<div id="canais">
<input id="busca" placeholder="Buscar canal...">
<div id="lista"></div>
</div>

<div id="player">
<video id="video" controls playsinline></video>
<div id="overlay"></div>
</div>

<script>

let canais=[]
let canalAtual=0
let hls
const video=document.getElementById("video")

// =======================
// CARREGAR
// =======================

async function carregar(){
await carregarM3U("lista.m3u")
await carregarJSON("lista.json")
await carregarAPI("https://api.meusite.com/canais")

mostrar()
abrir(0)
}

// =======================
// FORMATOS
// =======================

async function carregarM3U(url){
try{
const res=await fetch(url)
const txt=await res.text()
const linhas=txt.split("\n")

for(let i=0;i<linhas.length;i++){
if(linhas[i].startsWith("#EXTINF")){
let nome=linhas[i].split(",")[1]
let link=linhas[i+1]
canais.push({nome,url:link})
}
}
}catch(e){}
}

async function carregarJSON(url){
try{
const res=await fetch(url)
const data=await res.json()

data.forEach(c=>{
canais.push({nome:c.nome,url:c.url})
})
}catch(e){}
}

async function carregarAPI(url){
try{
const res=await fetch(url)
const data=await res.json()

data.canais.forEach(c=>{
canais.push({nome:c.nome,url:c.stream})
})
}catch(e){}
}

// =======================
// UI
// =======================

function mostrar(){

const lista=document.getElementById("lista")
const busca=document.getElementById("busca").value.toLowerCase()

lista.innerHTML=""

canais
.filter(c=>c.nome.toLowerCase().includes(busca))
.forEach((c,i)=>{

let item=document.createElement("div")
item.className="canal"
item.innerText=c.nome

if(i===canalAtual) item.classList.add("ativo")

item.onclick=()=>abrir(i)

lista.appendChild(item)

})

}

// busca
document.getElementById("busca").addEventListener("input", mostrar)

// =======================
// PLAYER
// =======================

function abrir(i){

if(i<0 || i>=canais.length) return

canalAtual=i
const url=canais[i].url

document.getElementById("overlay").innerText=canais[i].nome

if(hls){
hls.destroy()
hls=null
}

video.pause()
video.removeAttribute("src")
video.load()

if(Hls.isSupported()){

hls=new Hls({
lowLatencyMode:true,
maxBufferLength:10
})

hls.loadSource(url)
hls.attachMedia(video)

hls.on(Hls.Events.MANIFEST_PARSED,()=>{
video.play().catch(()=>{})
})

hls.on(Hls.Events.ERROR,(event,data)=>{
if(data.fatal){
abrir(canalAtual)
}
})

}else{

video.src=url
video.onloadedmetadata=()=>{
video.play().catch(()=>{})
}

}

atualizar()

}

// =======================
// CONTROLE
// =======================

document.addEventListener("keydown",(e)=>{
if(e.key==="ArrowDown") abrir(canalAtual+1)
if(e.key==="ArrowUp") abrir(canalAtual-1)
if(e.key==="Enter") video.play().catch(()=>{})
})

// =======================
// ATUALIZAR
// =======================

function atualizar(){

document.querySelectorAll(".canal").forEach((el,i)=>{
el.classList.toggle("ativo",i===canalAtual)
})

const ativo=document.querySelector(".canal.ativo")
if(ativo){
ativo.scrollIntoView({block:"center",behavior:"smooth"})
}

}

// =======================
// START
// =======================

carregar()

</script>

</body>
</html>
