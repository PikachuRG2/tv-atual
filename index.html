<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RG2 TV PRO</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css">
<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

header{
background:#000;
padding:15px;
text-align:center;
font-size:22px;
}

#loginArea{
display:flex;
justify-content:center;
align-items:center;
height:80vh;
}

.player{
width:100%;
max-width:900px;
margin:auto;
}

.categorias{
display:flex;
gap:10px;
padding:10px;
}

button{
padding:10px 15px;
background:#00aaff;
border:none;
color:white;
cursor:pointer;
}

#lista{
padding:10px;
}

.canal{
padding:10px;
border-bottom:1px solid #222;
cursor:pointer;
}

.canal:hover{
background:#1f1f1f;
}

</style>
</head>

<body>

<header>📺 RG2 TV PRO</header>

<div id="loginArea">
<button onclick="login()">Entrar com Google</button>
</div>

<div id="app" style="display:none;">

<div class="player">

<video id="video"></video>

</div>

<div class="categorias">
<button onclick="carregar('tv')">TV</button>
<button onclick="carregar('esportes')">Esportes</button>
</div>

<div id="lista"></div>

</div>

<script>

const firebaseConfig = {

apiKey:"AIzaSyCI8ArQt-1KgPjue7hROhGIKa-m8cF90a4",
authDomain:"rg2-tv-pro.firebaseapp.com",
projectId:"rg2-tv-pro"

}

firebase.initializeApp(firebaseConfig)

const auth = firebase.auth()
const db = firebase.firestore()

let player = new Plyr('#video')
let hls

function login(){

const provider = new firebase.auth.GoogleAuthProvider()

auth.signInWithPopup(provider)

}

auth.onAuthStateChanged(user=>{

if(user){

document.getElementById("loginArea").style.display="none"
document.getElementById("app").style.display="block"

}

})

function carregar(cat){

const lista=document.getElementById("lista")

lista.innerHTML="Carregando..."

db.collection("canais")
.where("categoria","==",cat)
.get()
.then(snapshot=>{

lista.innerHTML=""

snapshot.forEach(doc=>{

const c=doc.data()

let div=document.createElement("div")

div.className="canal"
div.innerText=c.nome

div.onclick=()=>abrir(c.url)

lista.appendChild(div)

})

})

}

function abrir(url){

const video=document.getElementById("video")

if(hls){
hls.destroy()
hls=null
}

if(url.includes(".m3u8")){

hls=new Hls()

hls.loadSource(url)

hls.attachMedia(video)

}else{

video.src=url

}

player.play()

}

</script>

</body>
</html>
