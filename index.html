<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RG2 TV PRO</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

header{
background:#000;
padding:15px;
font-size:22px;
text-align:center;
border-bottom:1px solid #333;
}

#loginArea{
display:flex;
justify-content:center;
align-items:center;
height:80vh;
}

button{
padding:10px 20px;
background:#00aaff;
border:none;
color:white;
cursor:pointer;
}

.player{
width:100%;
background:black;
}

video{
width:100%;
height:350px;
background:black;
}

.categorias{
display:flex;
gap:10px;
padding:10px;
flex-wrap:wrap;
}

#lista{
padding:10px;
}

.canal{
padding:10px;
border-bottom:1px solid #222;
cursor:pointer;
}

.canal:hover{
background:#1f1f1f;
}

.canal.ativo{
background:#00aaff;
}

</style>
</head>

<body>

<header>📺 RG2 TV PRO</header>

<div id="loginArea">
<button onclick="login()">Entrar com Google</button>
</div>

<div id="app" style="display:none;">

<div class="player">
<video id="video" controls autoplay></video>
</div>

<div class="categorias">
<button onclick="carregar('tv')">TV</button>
<button onclick="carregar('esportes')">Esportes</button>
<button onclick="carregar('filmes')">Filmes</button>
</div>

<div id="lista"></div>

</div>

<script>

const firebaseConfig = {

apiKey: "AIzaSyCI8ArQt-1KgPjue7hROhGIKa-m8cF90a4",
authDomain: "rg2-tv-pro.firebaseapp.com",
projectId: "rg2-tv-pro"

};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let hls;
let canais = [];
let canalAtual = 0;

/* LOGIN GOOGLE */

function login(){

const provider = new firebase.auth.GoogleAuthProvider();

auth.signInWithPopup(provider);

}

auth.onAuthStateChanged(user=>{

if(user){

document.getElementById("loginArea").style.display="none";
document.getElementById("app").style.display="block";

}

});

/* CARREGAR CANAIS */

function carregar(cat){

const lista = document.getElementById("lista");

lista.innerHTML="Carregando..."
canais=[]

db.collection("canais")
.where("categoria","==",cat)
.get()
.then(snapshot=>{

lista.innerHTML=""

if(snapshot.empty){
lista.innerHTML="Nenhum canal encontrado"
return
}

snapshot.forEach(doc=>{

const c = doc.data() || {}

let nome = c.nome ? c.nome.trim() : "Canal"
let url  = c.url ? c.url.trim() : ""

if(!url) return

canais.push({nome,url})

})

mostrar()

})
.catch(err=>{
console.error("Erro ao carregar canais:",err)
})

}

/* MOSTRAR LISTA */

function mostrar(){

const lista=document.getElementById("lista")
lista.innerHTML=""

canais.forEach((c,i)=>{

let div=document.createElement("div")

div.className="canal"
div.innerText=c.nome

if(i===canalAtual){
div.classList.add("ativo")
}

div.onclick=()=>abrir(i)

lista.appendChild(div)

})

}

/* ABRIR CANAL */

function abrir(i){

if(!canais[i]) return

canalAtual=i

const url=canais[i].url
const video=document.getElementById("video")

if(hls){
hls.destroy()
hls=null
}

if(url.includes(".m3u8") && Hls.isSupported()){

hls=new Hls({
lowLatencyMode:true
})

hls.loadSource(url)
hls.attachMedia(video)

}else{

video.src=url

}

atualizarUI()

}

/* ATUALIZAR CANAL ATIVO */

function atualizarUI(){

document.querySelectorAll(".canal").forEach((el,i)=>{

el.classList.toggle("ativo",i===canalAtual)

})

}

/* CONTROLE REMOTO / TECLADO */

document.addEventListener("keydown",e=>{

if(e.key==="ArrowDown"){
if(canalAtual < canais.length-1){
abrir(canalAtual+1)
}
}

if(e.key==="ArrowUp"){
if(canalAtual > 0){
abrir(canalAtual-1)
}
}

})

</script>

</body>
</html>
