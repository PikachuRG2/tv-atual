<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RG2 TV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{
background:#0b0b0b;
color:white;
font-family:Arial;
margin:0;
display:flex;
height:100vh;
overflow:hidden;
}

#canais{
width:280px;
overflow:auto;
background:#111;
}

.canal{
padding:12px;
border-bottom:1px solid #222;
cursor:pointer;
}

.canal:hover{
background:#1f1f1f;
}

.canal.ativo{
background:#00aaff;
}

#player{
flex:1;
display:flex;
justify-content:center;
align-items:center;
background:black;
}

video{
width:100%;
height:100%;
background:black;
}
</style>
</head>

<body>

<div id="canais"></div>

<div id="player">
<video id="video" controls playsinline></video>
</div>

<script>

let canais=[]
let canalAtual=0
let hls
const video=document.getElementById("video")

// =======================
// CARREGAR LISTAS
// =======================

async function carregar(){

await carregarM3U("lista.m3u")
await carregarJSON("lista.json")
await carregarAPI("https://api.meusite.com/canais")

mostrar()
abrir(0)

}

async function carregarM3U(url){

try{
const res=await fetch(url)
const txt=await res.text()

const linhas=txt.split("\n")

for(let i=0;i<linhas.length;i++){

if(linhas[i].startsWith("#EXTINF")){

let nome=linhas[i].split(",")[1]
let link=linhas[i+1]

canais.push({nome,url:link})

}

}
}catch(e){}

}

async function carregarJSON(url){

try{
const res=await fetch(url)
const data=await res.json()

data.forEach(c=>{
canais.push({
nome:c.nome,
url:c.url
})
})
}catch(e){}

}

async function carregarAPI(url){

try{
const res=await fetch(url)
const data=await res.json()

data.canais.forEach(c=>{
canais.push({
nome:c.nome,
url:c.stream
})
})
}catch(e){}

}

// =======================
// UI
// =======================

function mostrar(){

const div=document.getElementById("canais")
div.innerHTML=""

canais.forEach((c,i)=>{

let item=document.createElement("div")
item.className="canal"
item.innerText=c.nome

if(i===canalAtual) item.classList.add("ativo")

item.onclick=()=>abrir(i)

div.appendChild(item)

})

}

// =======================
// PLAYER (CORRIGIDO)
// =======================

function abrir(i){

if(i < 0 || i >= canais.length) return

canalAtual=i
const url=canais[i].url

// reset seguro
if(hls){
hls.destroy()
hls = null
}

video.pause()
video.removeAttribute("src")
video.load()

// HLS.js
if(Hls.isSupported()){

hls = new Hls({
lowLatencyMode:true,
maxBufferLength:10,
enableWorker:true
})

hls.loadSource(url)
hls.attachMedia(video)

hls.on(Hls.Events.MANIFEST_PARSED, () => {
video.play().catch(()=>{})
})

// fallback erro
hls.on(Hls.Events.ERROR, function(event, data) {
if (data.fatal) {
console.log("Erro HLS:", data)
abrir(canalAtual)
}
})

}else{
// Safari / TVs nativas
video.src = url

video.onloadedmetadata = () => {
video.play().catch(()=>{})
}

}

atualizar()

}

// =======================
// EVITAR PAUSA AUTOMÁTICA
// =======================

video.addEventListener('pause', () => {

setTimeout(()=>{
if(!video.paused) return
video.play().catch(()=>{})
}, 500)

})

// =======================
// CONTROLE REMOTO (TECLAS)
// =======================

document.addEventListener("keydown",e=>{

if(e.key==="ArrowDown"){
abrir(canalAtual+1)
}

if(e.key==="ArrowUp"){
abrir(canalAtual-1)
}

if(e.key==="Enter"){
video.play().catch(()=>{})
}

})

// =======================
// ATUALIZAR UI
// =======================

function atualizar(){

document.querySelectorAll(".canal").forEach((el,i)=>{
el.classList.toggle("ativo",i===canalAtual)
})

}

// =======================
// START
// =======================

carregar()

</script>

</body>
</html>
